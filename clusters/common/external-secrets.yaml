apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: demo-vault
  annotations:
    argocd.argoproj.io/sync-wave: '-30'
spec:
  provider:
    vault:
      server: http://vault.vault-demo.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: vault-auth
          namespace: vault-demo
          key: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bookinfo-db-app
  namespace: bookinfo
  annotations:
    argocd.argoproj.io/sync-wave: '-25'
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: demo-vault
  target:
    name: bookinfo-db-app
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: '{{ .username }}'
        password: '{{ .password }}'
        database: '{{ .database }}'
  data:
  - secretKey: username
    remoteRef:
      key: bookinfo/app
      property: username
  - secretKey: password
    remoteRef:
      key: bookinfo/app
      property: password
  - secretKey: database
    remoteRef:
      key: bookinfo/app
      property: database
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wait-for-bookinfo-db-app
  namespace: bookinfo
  annotations:
    argocd.argoproj.io/sync-wave: '-24'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wait-for-bookinfo-db-app
  namespace: bookinfo
  annotations:
    argocd.argoproj.io/sync-wave: '-24'
rules:
- apiGroups:
  - ''
  resources:
  - secrets
  verbs:
  - get
- apiGroups:
  - external-secrets.io
  resources:
  - externalsecrets
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wait-for-bookinfo-db-app
  namespace: bookinfo
  annotations:
    argocd.argoproj.io/sync-wave: '-24'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wait-for-bookinfo-db-app
subjects:
- kind: ServiceAccount
  name: wait-for-bookinfo-db-app
  namespace: bookinfo
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-bookinfo-db-app
  namespace: bookinfo
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: '-23'
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wait-for-bookinfo-db-app
    spec:
      restartPolicy: OnFailure
      serviceAccountName: wait-for-bookinfo-db-app
      containers:
      - name: wait
        image: registry.redhat.io/openshift4/ose-cli:v4.22
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -ec
        args:
        - "echo \"Waiting for External Secrets to create bookinfo-db-app...\"\nwhile ! oc get secret bookinfo-db-app >/dev/null 2>&1; do\n  echo\n  echo \"ExternalSecret status:\"\n  oc get externalsecret bookinfo-db-app                   -o jsonpath='{range .status.conditions[*]}{.type}={.status} reason={.reason} message={.message}{\"\\n\"}{end}'                   2>/dev/null || true\n  sleep 10\ndone\n\nfor key in username password database; do\n  oc get secret bookinfo-db-app                   -o \"jsonpath={.data.${key}}\" |\n    grep -q . || {\n      echo \"Secret bookinfo-db-app is missing key: ${key}\"\n      exit 1\n    }\ndone\n\necho \"bookinfo-db-app is ready.\"\n"
