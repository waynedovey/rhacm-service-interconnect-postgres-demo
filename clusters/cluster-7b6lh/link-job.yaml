apiVersion: v1
kind: ServiceAccount
metadata:
  name: service-interconnect-link-bootstrap
  namespace: bookinfo
  annotations:
    argocd.argoproj.io/sync-wave: '-11'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: service-interconnect-link-bootstrap
  namespace: bookinfo
  annotations:
    argocd.argoproj.io/sync-wave: '-11'
rules:
- apiGroups:
  - ''
  resources:
  - secrets
  verbs:
  - get
- apiGroups:
  - skupper.io
  resources:
  - accesstokens
  - links
  verbs:
  - get
  - list
  - create
  - update
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: service-interconnect-link-bootstrap
  namespace: bookinfo
  annotations:
    argocd.argoproj.io/sync-wave: '-11'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: service-interconnect-link-bootstrap
subjects:
- kind: ServiceAccount
  name: service-interconnect-link-bootstrap
  namespace: bookinfo
---
apiVersion: batch/v1
kind: Job
metadata:
  name: service-interconnect-link-bootstrap
  namespace: bookinfo
  annotations:
    argocd.argoproj.io/sync-wave: '-10'
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 20
  template:
    metadata:
      labels:
        app.kubernetes.io/name: service-interconnect-link-bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: service-interconnect-link-bootstrap
      containers:
      - name: create-token
        image: registry.redhat.io/openshift4/ose-cli-rhel9:v4.22
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -ec
        args:
        - "until oc get secret service-interconnect-token-ca >/dev/null 2>&1 &&\n      oc get secret service-interconnect-token-metadata >/dev/null 2>&1; do\n  echo \"Waiting for External Secrets to create Service Interconnect token data...\"\n\n  oc get externalsecret service-interconnect-token-ca \\\n    -o jsonpath='{range .status.conditions[*]}{.type}={.status} reason={.reason} message={.message}{\"\\n\"}{end}' \\\n    2>/dev/null || true\n\n  oc get externalsecret service-interconnect-token-metadata \\\n    -o jsonpath='{range .status.conditions[*]}{.type}={.status} reason={.reason} message={.message}{\"\\n\"}{end}' \\\n    2>/dev/null || true\n\n  sleep 10\ndone\n\nif oc get accesstoken token-to-cluster-pwv6d >/dev/null 2>&1; then\n  echo \"AccessToken already exists\"\n  exit 0\nfi\n\nURL=\"$(\n  oc get secret service-interconnect-token-metadata \\\n    -o jsonpath='{.data.url}' |\n    base64 -d\n)\"\n\nCODE=\"$(\n  oc get secret service-interconnect-token-metadata \\\n    -o jsonpath='{.data.code}' |\n    base64 -d\n)\"\n\noc get secret service-interconnect-token-ca \\\n  -o jsonpath='{.data.ca}' |\n  base64 -d > /tmp/service-interconnect-ca.crt\n\n{\n  echo \"apiVersion: skupper.io/v2alpha1\"\n  echo \"kind: AccessToken\"\n  echo \"metadata:\"\n  echo \"  name: token-to-cluster-pwv6d\"\n  echo \"  namespace: bookinfo\"\n  echo \"spec:\"\n  printf '  code: \"%s\"\\n' \"${CODE}\"\n  printf '  url: \"%s\"\\n' \"${URL}\"\n  echo \"  ca: |-\"\n  sed 's/^/    /' /tmp/service-interconnect-ca.crt\n} | oc apply -f -\n"
