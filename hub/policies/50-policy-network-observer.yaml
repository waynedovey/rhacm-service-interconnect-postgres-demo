apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: install-network-observer
  namespace: si-demo-policies
  annotations:
    policy.open-cluster-management.io/standards: GitOps
    policy.open-cluster-management.io/categories: Observability
    policy.open-cluster-management.io/controls: Operator lifecycle
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: install-network-observer
        spec:
          remediationAction: enforce
          severity: medium
          pruneObjectBehavior: DeleteIfCreated
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: skupper-netobs-operator
                  namespace: openshift-operators
                spec:
                  channel: stable-2.2
                  installPlanApproval: Automatic
                  name: skupper-netobs-operator
                  source: redhat-operators
                  sourceNamespace: openshift-marketplace
                  startingCSV: skupper-netobs-operator.v2.2.1-rh-3
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: install-network-observer
  namespace: si-demo-policies
placementRef:
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
  name: si-demo-managed-clusters
subjects:
  - apiGroup: policy.open-cluster-management.io
    kind: Policy
    name: install-network-observer
