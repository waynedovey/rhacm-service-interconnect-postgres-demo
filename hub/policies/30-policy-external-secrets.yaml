apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: install-external-secrets
  namespace: si-demo-policies
  annotations:
    policy.open-cluster-management.io/standards: GitOps
    policy.open-cluster-management.io/categories: Security
    policy.open-cluster-management.io/controls: Secret lifecycle
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: install-external-secrets
        spec:
          remediationAction: enforce
          severity: high
          pruneObjectBehavior: DeleteIfCreated
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: external-secrets-operator
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1
                kind: OperatorGroup
                metadata:
                  name: openshift-external-secrets-operator
                  namespace: external-secrets-operator
                spec:
                  targetNamespaces: []
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: openshift-external-secrets-operator
                  namespace: external-secrets-operator
                spec:
                  channel: stable-v1.2
                  installPlanApproval: Automatic
                  name: openshift-external-secrets-operator
                  source: redhat-operators
                  sourceNamespace: openshift-marketplace
            - complianceType: musthave
              objectDefinition:
                apiVersion: operator.openshift.io/v1alpha1
                kind: ExternalSecretsConfig
                metadata:
                  name: cluster
                spec:
                  controllerConfig:
                    networkPolicies:
                      - componentName: ExternalSecretsCoreController
                        name: allow-external-secrets-egress
                        egress:
                          - {}
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: install-external-secrets
  namespace: si-demo-policies
placementRef:
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
  name: si-demo-managed-clusters
subjects:
  - apiGroup: policy.open-cluster-management.io
    kind: Policy
    name: install-external-secrets
